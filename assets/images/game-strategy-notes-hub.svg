<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">South Asian classroom teaching game strategy notes</title>
  <desc id="desc">A South Asian classroom scene where a teacher explains board and card game decisions to students using a chalkboard and review notes.</desc>
  <defs>
