    </linearGradient>
    <linearGradient id="board" x1="0" x2="1">
      <stop offset="0" stop-color="#0f513f"/>
      <stop offset="1" stop-color="#12664f"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#2c2515" flood-opacity="0.16"/>
    </filter>
  </defs>

