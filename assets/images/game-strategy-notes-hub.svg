  <text x="304" y="142" fill="#f7f3df" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="1.5">DECISION REVIEW CLASS</text>
  <text x="304" y="190" fill="#f7f3df" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">1. What was known before the move?</text>
  <text x="304" y="229" fill="#f7f3df" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">2. Was the risk useful or emotional?</text>
  <text x="304" y="268" fill="#f7f3df" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">3. Which pattern repeated?</text>
  <text x="304" y="307" fill="#f7f3df" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">4. What should be watched next game?</text>

